server:
  port: 8080

spring:
  application:
    name: fruit-management
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.180.128:3306/fruit_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: TanLiMing123!

  data:
    redis:
      host: 192.168.180.128
      port: 6379
      password: TanLiMing123!
      database: 0
      timeout: 3000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: fruit-management-secret-key-2026-very-long-secret-key-for-jwt-token-generation
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh_CN
